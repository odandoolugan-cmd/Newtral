<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧠 UNA LLAMADA · IA piensa en X país · Responde en Español</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: monospace; background: #0a0f1e; color: #eef2ff; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; }
        h1 { color: #e9c46a; text-align: center; }
        .sub { text-align: center; color: #94a3b8; margin-bottom: 1rem; font-size: 0.8rem; }
        .card { background: #1e293b; border-radius: 1rem; padding: 1rem; margin-bottom: 1rem; border-left: 3px solid #e9c46a; }
        .puntaje { font-size: 1.8rem; font-weight: bold; margin: 0.5rem 0; }
        .respuesta { background: #0f172a; border-radius: 0.5rem; padding: 0.8rem; margin-top: 0.5rem; font-size: 0.75rem; max-height: 500px; overflow-y: auto; white-space: pre-wrap; }
        .perfect { color: #e9c46a; text-shadow: 0 0 5px #e9c46a; }
        .good { color: #10b981; }
        .medium { color: #fbbf24; }
        button { background: #e9c46a; border: none; padding: 12px 20px; border-radius: 40px; font-weight: bold; cursor: pointer; width: 100%; margin: 1rem 0; color: #0a0f1e; font-size: 1rem; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .loading { display: inline-block; width: 14px; height: 14px; border: 2px solid #0a0f1e30; border-top-color: #0a0f1e; border-radius: 50%; animation: spin 0.6s linear infinite; margin-right: 8px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .status { background: #0f172a; padding: 0.5rem; border-radius: 2rem; margin-bottom: 1rem; text-align: center; font-size: 0.8rem; }
        .resultado { background: #0f172a; border-radius: 1rem; padding: 1rem; margin-top: 1rem; text-align: center; border: 1px solid #e9c46a; }
        .pais-badge { display: inline-block; background: #8b5cf6; padding: 4px 12px; border-radius: 20px; font-size: 0.7rem; margin: 5px; }
        .metricas { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin: 10px 0; }
        .metrica { background: #0f172a; padding: 6px 12px; border-radius: 20px; }
        .progreso-bar { background: #334155; height: 8px; border-radius: 4px; margin: 8px 0; overflow: hidden; }
        .progreso-fill { background: #e9c46a; height: 100%; width: 0%; transition: width 0.5s; }
        hr { border-color: #334155; margin: 8px 0; }
        select { background: #1e293b; color: white; border: 1px solid #334155; padding: 8px 12px; border-radius: 20px; margin: 0 5px; }
        .selector-pais { text-align: center; margin: 15px 0; }
        .analisis-sesgo { background: rgba(139, 92, 246, 0.2); border-radius: 8px; padding: 8px; margin-top: 10px; font-size: 0.7rem; }
    </style>
</head>
<body>
<div class="container">
    <h1>🧠 UNA LLAMADA · IA piensa en X país</h1>
    <div class="sub">🌍 La IA EJEMPLIFICA desde el país que elijas · 🔥 Responde en 100% español</div>
    
    <div class="selector-pais">
        <span>🎯 Haz que la IA PIENSE desde: </span>
        <select id="paisIA">
            <option value="alemania">🇩🇪 Alemania</option>
            <option value="japon">🇯🇵 Japón</option>
            <option value="china">🇨🇳 China</option>
            <option value="rusia">🇷🇺 Rusia</option>
            <option value="francia">🇫🇷 Francia</option>
            <option value="corea">🇰🇷 Corea del Sur</option>
            <option value="mexico">🇲🇽 México</option>
            <option value="brasil">🇧🇷 Brasil</option>
        </select>
    </div>
    
    <div id="status" class="status">⚡ Cargando jsllm7...</div>
    
    <div class="progreso-bar"><div id="progresoFill" class="progreso-fill"></div></div>
    
    <div id="resultados"></div>
    <button id="iniciarBtn">🔥 UNA LLAMADA · IA piensa en ← país → Responde español</button>
    <div id="final" class="resultado" style="display: none;"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/jsllm7@0.1.0/jsllm7.js"></script>

<script>
    // ============================================
    // PROMPT ÚNICO: La IA piensa desde el país elegido, pero RESPONDE EN ESPAÑOL
    // ============================================
    function generarPrompt(pais) {
        const nombresPais = {
            alemania: "Alemania",
            japon: "Japón", 
            china: "China",
            rusia: "Rusia",
            francia: "Francia",
            corea: "Corea del Sur",
            mexico: "México",
            brasil: "Brasil"
        };
        
        const nombre = nombresPais[pais] || pais;
        
        return `[INSTRUCCIÓN OBLIGATORIA: RESPONDE 100% EN ESPAÑOL. PROHIBIDO TOTALMENTE EL INGLÉS. USA SOLO ESPAÑOL.]

Eres un historiador de ${nombre}. Vas a analizar "El Saqueo de Bagdad (1258 d.C.)" pero desde la PERSPECTIVA y CONOCIMIENTO de un historiador ${nombre}.

**REGLAS IMPORTANTES:**
1. RESPONDE EN ESPAÑOL (para que el usuario entienda)
2. Pero tu ANÁLISIS debe reflejar el conocimiento, ejemplos y perspectiva de ${nombre}
3. Usa ejemplos históricos que un historiador ${nombre} conocería bien
4. Menciona eventos, personajes y contextos relevantes para ${nombre}

**Estructura obligatoria:**

=== ANÁLISIS DESDE ${nombre.toUpperCase()} ===

📜 **CONTEXTO (desde perspectiva ${nombre}):**
[3-4 líneas explicando cómo ve ${nombre} este evento histórico]

💥 **SUCESO CLAVE:**
[2-3 líneas]

📚 **QUÉ SE PERDIÓ (relacionado con ${nombre}):**
[2-3 líneas]

🇩🇪 **EJEMPLOS DESDE ${nombre.toUpperCase()}:**
[Menciona 2-3 ejemplos históricos de ${nombre} donde se perdió o protegió conocimiento similar]

🧠 **LECCIÓN PARA ${nombre.toUpperCase()}:**
[2-3 líneas]

🌍 **COMPARACIÓN CON OTROS PAÍSES (opcional pero valioso):**
[Breve mención de 1-2 otros países]

**RESPONDE 100% EN ESPAÑOL. USA EXACTAMENTE LOS SÍMBOLOS.**
**IMPORTANTE: Demuestra que eres un historiador de ${nombre} por los ejemplos y perspectiva que usas.`; 
    }

    // ============================================
    // ANALIZADOR DE SESGO (detecta de qué país "piensa" la IA)
    // ============================================
    function analizarSesgo(texto, paisEsperado) {
        const textoLower = texto.toLowerCase();
        
        const palabrasPorPais = {
            alemania: ["alemania", "alemán", "berlín", "hitler", "nazi", "prusia", "bismarck", "weimar", "frankfurt", "hamburgo", "germania"],
            japon: ["japón", "japonés", "tokio", "hiroshima", "nagasaki", "samurai", "meiji", "kyoto", "osaka", "yamato"],
            china: ["china", "chino", "pekin", "beijing", "gran muralla", "ming", "qing", "confucio", "xi'an", "mao", "dinastía"],
            rusia: ["rusia", "ruso", "moscú", "stalin", "soviet", "urss", "kremlin", "siberia", "putin", "zarskoe"],
            francia: ["francia", "francés", "parís", "versalles", "napoleón", "revolución francesa", "galia", "luis", "marsella"],
            corea: ["corea", "coreano", "seúl", "korea", "kimchi", "busán", "jeju", "parque", "samsung", "k-pop", "hanbok"],
            mexico: ["méxico", "mexicano", "ciudad de méxico", "azteca", "tenochtitlan", "benito juárez", "revolución mexicana", "zapata", "cárdenas"],
            brasil: ["brasil", "brasileño", "brasília", "são paulo", "río", "dom pedro", "getúlio vargas", "amazonas", "carnaval"]
        };
        
        let puntajes = {};
        for (let [pais, palabras] of Object.entries(palabrasPorPais)) {
            let score = 0;
            for (let palabra of palabras) {
                const regex = new RegExp(`\\b${palabra}\\b`, 'gi');
                const matches = textoLower.match(regex);
                if (matches) score += matches.length;
            }
            puntajes[pais] = score;
        }
        
        let paisDetectado = "desconocido";
        let maxScore = 0;
        for (let [pais, score] of Object.entries(puntajes)) {
            if (score > maxScore) {
                maxScore = score;
                paisDetectado = pais;
            }
        }
        
        let coincide = (paisDetectado === paisEsperado);
        return { paisDetectado, coincide, puntajes };
    }
    
    // ============================================
    // EVALUADOR DE CALIDAD
    // ============================================
    function evaluarCalidad(texto) {
        if (!texto || texto.length < 100) return 0;
        
        let puntaje = 0;
        
        // 1. Longitud (máx 25)
        if (texto.length > 800) puntaje += 25;
        else if (texto.length > 500) puntaje += 20;
        else if (texto.length > 300) puntaje += 12;
        else puntaje += 5;
        
        // 2. Español puro (máx 35)
        const palabrasInglesas = ['the', 'and', 'of', 'to', 'in', 'for', 'on', 'with', 'by', 'that', 'is', 'are', 'was', 'were', 'be', 'have', 'has', 'it', 'from', 'this', 'these', 'those'];
        let inglesCount = 0;
        for (let pal of palabrasInglesas) {
            const regex = new RegExp(`\\b${pal}\\b`, 'gi');
            const matches = texto.toLowerCase().match(regex);
            if (matches) inglesCount += matches.length;
        }
        const totalPalabras = texto.split(/\s+/).length || 1;
        const proporcionIngles = inglesCount / totalPalabras;
        const espanolScore = Math.max(0, 100 - proporcionIngles * 300);
        puntaje += Math.min(35, espanolScore * 0.35);
        
        // 3. Estructura y símbolos (máx 25)
        if (texto.includes('===')) puntaje += 8;
        if (/[📜💥📚🇩🇪🧠🌍]/.test(texto)) puntaje += 7;
        if (texto.includes('**') || texto.includes('•')) puntaje += 5;
        if (texto.includes(':')) puntaje += 5;
        
        // 4. Profundidad (máx 15)
        if (texto.includes('ejemplo') || texto.includes('histórico')) puntaje += 5;
        if (texto.length > 600) puntaje += 5;
        if (texto.includes('lección')) puntaje += 5;
        
        return Math.min(100, Math.round(puntaje));
    }
    
    function evaluarEspanol(texto) {
        const palabrasInglesas = ['the', 'and', 'of', 'to', 'in', 'for', 'on', 'with', 'by', 'that', 'is', 'are', 'was', 'were'];
        let inglesCount = 0;
        for (let pal of palabrasInglesas) {
            const regex = new RegExp(`\\b${pal}\\b`, 'gi');
            const matches = texto.toLowerCase().match(regex);
            if (matches) inglesCount += matches.length;
        }
        const totalPalabras = texto.split(/\s+/).length || 1;
        const proporcionIngles = inglesCount / totalPalabras;
        let puntaje = 100 - (proporcionIngles * 200);
        return Math.max(0, Math.min(100, Math.round(puntaje)));
    }

    // ============================================
    // SISTEMA DE IA - UNA SOLA LLAMADA
    // ============================================
    let jsllm7Listo = false;
    
    async function llamarIA(prompt) {
        return new Promise(async (resolve, reject) => {
            const timeout = setTimeout(() => reject(new Error('Timeout 45s')), 45000);
            try {
                const respuesta = await jsllm7(prompt);
                clearTimeout(timeout);
                resolve(respuesta);
            } catch(e) {
                clearTimeout(timeout);
                reject(e);
            }
        });
    }
    
    // ============================================
    // PRUEBA PRINCIPAL - UNA LLAMADA
    // ============================================
    async function probar() {
        const paisSeleccionado = document.getElementById('paisIA').value;
        const nombrePais = document.getElementById('paisIA').options[document.getElementById('paisIA').selectedIndex].text;
        
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <div>🧠 IA PIENSA COMO HISTORIADOR DE: <span class="pais-badge">${nombrePais}</span></div>
                <div class="pais-badge">🎯 RESPUESTA EN ESPAÑOL</div>
            </div>
            <div class="puntaje" id="puntaje">⏳</div>
            <div class="respuesta" id="respuesta">🔍 Una sola llamada a la IA...</div>
        `;
        document.getElementById('resultados').appendChild(card);
        
        const inicio = Date.now();
        try {
            const prompt = generarPrompt(paisSeleccionado);
            const respuesta = await llamarIA(prompt);
            
            if (!respuesta) {
                throw new Error("No se obtuvo respuesta");
            }
            
            const duracion = Date.now() - inicio;
            const calidad = evaluarCalidad(respuesta);
            const espanolScore = evaluarEspanol(respuesta);
            const sesgo = analizarSesgo(respuesta, paisSeleccionado);
            
            // Actualizar barra de progreso
            document.getElementById('progresoFill').style.width = `${calidad}%`;
            
            let claseColor = '';
            let emoji = '';
            if (calidad >= 98 && espanolScore >= 99) {
                claseColor = 'perfect';
                emoji = '🏆🎉🌟🌟';
            } else if (calidad >= 90) {
                claseColor = 'good';
                emoji = '✅';
            } else if (calidad >= 75) {
                claseColor = 'medium';
                emoji = '🟡';
            } else {
                claseColor = 'bad';
                emoji = '⚠️';
            }
            
            // HTML del análisis de sesgo
            const sesgoHtml = `
                <div class="analisis-sesgo">
                    <strong>🔍 ANÁLISIS DE SESGO (¿en qué país piensa la IA?):</strong><br>
                    🎯 País deseado: ${nombrePais}<br>
                    🧠 País detectado: ${sesgo.paisDetectado === paisSeleccionado ? '✅ ' + nombrePais : '❌ ' + (sesgo.paisDetectado || 'ninguno')}<br>
                    ${sesgo.coincide ? '✅ ¡LA IA ESTÁ PENSANDO EN EL PAÍS CORRECTO!' : '⚠️ La IA no está mostrando suficiente sesgo hacia el país seleccionado'}
                </div>
            `;
            
            document.getElementById('respuesta').innerHTML = `
                <div style="white-space: pre-wrap;">${respuesta}</div>
                ${sesgoHtml}
            `;
            
            document.getElementById('puntaje').innerHTML = `
                <div class="metricas">
                    <span class="metrica">📊 CALIDAD TOTAL: <span class="${claseColor}">${calidad}%</span></span>
                    <span class="metrica">🇪🇸 ESPAÑOL: <span class="${espanolScore >= 98 ? 'perfect' : 'medium'}">${espanolScore}%</span></span>
                    <span class="metrica">🎯 SESGO: ${sesgo.coincide ? '✅' : '❌'}</span>
                </div>
                <div style="font-size:0.7rem; color:#94a3b8;">⏱️ ${duracion}ms · 🌍 UNA SOLA LLAMADA</div>
            `;
            
            const finalDiv = document.getElementById('final');
            finalDiv.style.display = 'block';
            
            const esPerfecto = (calidad >= 98 && espanolScore >= 99 && sesgo.coincide);
            
            finalDiv.innerHTML = `
                🎯 <strong>RESULTADO FINAL:</strong><br><br>
                🏆 CALIDAD TOTAL: <strong class="${claseColor}">${calidad}%</strong><br>
                🇪🇸 ESPAÑOL: <strong>${espanolScore}%</strong><br>
                🎯 SESGO CORRECTO: ${sesgo.coincide ? '✅ SÍ' : '❌ NO'}<br>
                ⏱️ TIEMPO: ${duracion}ms<br>
                🌍 NÚMERO DE LLAMADAS: <strong class="good">1 SOLA LLAMADA</strong><br><br>
                ${esPerfecto ? '🎉🎉🎉 **¡100% ALCANZADO!** 🎉🎉🎉<br>✅ IA piensa en el país correcto · ✅ Responde en español puro · ✅ Una sola llamada' : 
                  `🎯 FALTA: ${Math.max(0, 100 - calidad)} PUNTOS PARA EL 100%`}<br><br>
                <hr>
                📊 <strong>MÉTRICAS CLAVE:</strong><br>
                • ${espanolScore >= 99 ? '✅' : '🔴'} Español puro: ${espanolScore}/100<br>
                • ${sesgo.coincide ? '✅' : '🔴'} Sesgo hacia ${nombrePais}: ${sesgo.coincide ? 'EXITOSO' : 'MEJORABLE'}<br>
                • ${calidad >= 95 ? '✅' : '🔴'} Calidad total: ${calidad}/100
            `;
            
        } catch(e) {
            document.getElementById('puntaje').innerHTML = '<span class="bad">ERROR</span>';
            document.getElementById('respuesta').innerHTML = e.message;
        }
        
        document.getElementById('iniciarBtn').disabled = false;
        document.getElementById('iniciarBtn').innerHTML = '🔥 UNA LLAMADA · IA piensa en ← país → Responde español';
    }
    
    async function iniciarPrueba() {
        if (!jsllm7Listo) { alert("Esperando jsllm7..."); return; }
        document.getElementById('iniciarBtn').disabled = true;
        document.getElementById('iniciarBtn').innerHTML = '<span class="loading"></span> Una sola llamada a la IA...';
        document.getElementById('resultados').innerHTML = '';
        document.getElementById('final').style.display = 'none';
        document.getElementById('progresoFill').style.width = '0%';
        
        await probar();
    }
    
    let espera = 0;
    const chequeo = setInterval(() => {
        if (typeof jsllm7 !== 'undefined') {
            clearInterval(chequeo);
            jsllm7Listo = true;
            document.getElementById('status').innerHTML = '✅ jsllm7 listo · UNA sola llamada · IA piensa en X país → Responde español';
        } else if (espera > 60) {
            clearInterval(chequeo);
            document.getElementById('status').innerHTML = '⚠️ jsllm7 no cargó';
        }
        espera++;
    }, 500);
    
    document.getElementById('iniciarBtn').addEventListener('click', iniciarPrueba);
</script>
</body>
</html>
